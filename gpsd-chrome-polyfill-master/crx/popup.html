<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 200px;
            font-family: sans-serif;
            padding: 10px;
            margin: 0;
            background: #f4f4f9;
        }
        h3 { font-size: 14px; margin-top: 0; color: #333; }
        .data-box {
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        .label { color: #666; font-size: 10px; display: block; }
        button {
            width: 100%;
            padding: 6px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h3>GPSD Live Status</h3>

    <div class="data-box">
        <span class="label">Breitengrad (Lat)</span>
        <span id="lat">Warte...</span>
    </div>

    <div class="data-box">
        <span class="label">Längengrad (Lng)</span>
        <span id="lng">Warte...</span>
    </div>

    <button id="refresh">Extension Neustart</button>

    <script src="popup.js"></script>
</body>
</html>
